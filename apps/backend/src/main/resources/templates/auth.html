<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Acceso y Registro</title>
    <style>
        .container { display: flex; gap: 50px; justify-content: center; margin-top: 50px; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <h2>Iniciar Sesión</h2>
        <form th:action="@{/login}" method="post">
            <!--Spring Security necesita que el campo se llame username obligatoriamente -->
            <input type="text" name="username" placeholder="Usuario" required><br><br>
            <input type="password" name="contrasenya" placeholder="Contraseña" required><br><br>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <div class="box">
        <h2>Crear Cuenta</h2>
        <form th:action="@{/registro}" method="post">
            <input type="text" name="usuario" placeholder="Nuevo Usuario" required><br><br>
            <input type="text" name="correo" placeholder="Correo Electrónico" required><br><br>
            <input type="password" name="contraseña" placeholder="Nueva Contraseña" required><br><br>
            <input type="password" name="contraseña2" placeholder="Confirmar Contraseña" required><br><br>
            <button type="submit">Registrarse</button>
        </form>
    </div>
</div>
</body>
</html>

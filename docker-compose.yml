version: '2.4'

services:
  frontend:
    build:
      context: ./apps/frontend
    container_name: frontend
    ports:
      - '5173:5173'
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_USE_MOCK=false
      - VITE_API_URL=http://localhost:8080/api
    command: npm run dev -- --host 0.0.0.0
    develop:
      watch:
        - action: rebuild
          path: ./apps/frontend/package.json
        - action: rebuild
          path: ./apps/frontend/package-lock.json
        - action: rebuild
          path: ./apps/frontend/Dockerfile

  # Base de Datos: MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      TZ: Europe/Madrid
      MYSQL_DATABASE: sistema_diagnostico
      MYSQL_ROOT_PASSWORD: Root
      MYSQL_USER: user_spring
      MYSQL_PASSWORD: user_password
    ports:
      - '3306:3306'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend:
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    restart: on-failure
    ports:
      - '8080:8080'
    environment:
      - TZ=Europe/Madrid
      # Forzamos a la JVM de Java a usar la zona horaria correcta
      - JAVA_OPTS=-Duser.timezone=Europe/Madrid
      # Añadimos serverTimezone a la URL para evitar conflictos con MySQL
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/sistema_diagnostico?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Europe/Madrid
      - SPRING_DATASOURCE_USERNAME=user_spring
      - SPRING_DATASOURCE_PASSWORD=user_password
      - CLASSIFIER_API_URL=http://clasificador:5000/api
    depends_on:
      db:
        condition: service_healthy

  clasificador:
    build:
      context: ./apps/clasificador
    container_name: clasificador
    ports:
      - '5000:5000'
    volumes:
      - ./apps/clasificador/models:/app/models
      - ./apps/clasificador/data:/app/data
    environment:
      - TZ=Europe/Madrid
      - PYTHONUNBUFFERED=1

  # Prometheus: Metrics Storage
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./environment/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - backend
    restart: on-failure

  # Grafana: Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./environment/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: on-failure

volumes:
  frontend_node_modules:
  prometheus_data:
  grafana_data:

version: '2.4'

services:
  frontend:
    build:
      context: ./apps/frontend
    container_name: frontend
    ports:
      - '5173:5173'
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_USE_MOCK=false
      - VITE_API_URL=http://localhost:8080/api
    command: npm run dev -- --host 0.0.0.0
    develop:
      watch:
        - action: rebuild
          path: ./apps/frontend/package.json
        - action: rebuild
          path: ./apps/frontend/package-lock.json
        - action: rebuild
          path: ./apps/frontend/Dockerfile

  # Base de Datos: MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: sistema_diagnostico
      MYSQL_ROOT_PASSWORD: Root
      MYSQL_USER: user_spring
      MYSQL_PASSWORD: user_password
    ports:
      - '3306:3306'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend:
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    restart: on-failure
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/sistema_diagnostico?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=user_spring
      - SPRING_DATASOURCE_PASSWORD=user_password
      - CLASSIFIER_API_URL=http://clasificador:5000/api
    depends_on:
      db:
        condition: service_healthy

  clasificador:
    build:
      context: ./apps/clasificador
    container_name: clasificador
    ports:
      - '5000:5000'
    volumes:
      - ./apps/clasificador/models:/app/models
      - ./apps/clasificador/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  frontend_node_modules:

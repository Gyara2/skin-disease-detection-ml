spring.docker.compose.enabled=false

spring.datasource.url=jdbc:mysql://localhost:3306/sistema_diagnostico?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

classifier.api.url=http://localhost:5000/api

# Prometheus Metrics Configuration
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
